<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 260px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #0f3460;
        }

        #sidebar .sidebar-header button {
            width: 100%;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        #sidebar .sidebar-header button:hover {
            opacity: 0.9;
        }

        #conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .conv-item:hover {
            background: #0f3460;
        }

        .conv-item.active {
            background: #0f3460;
            color: #e94560;
            font-weight: 600;
        }

        .conv-item .conv-info {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-item .conv-meta {
            font-size: 0.7rem;
            color: #666;
            margin-top: 2px;
        }

        .conv-item .conv-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.15s;
        }

        .conv-item:hover .conv-delete {
            opacity: 1;
        }

        .conv-item .conv-delete:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        /* Main area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e94560;
        }

        header .status {
            font-size: 0.75rem;
            color: #4ecca3;
            background: rgba(78, 204, 163, 0.1);
            padding: 4px 8px;
            border-radius: 12px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            border: 1px solid #1a4080;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
        }

        .message.error {
            align-self: center;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            color: #e94560;
            font-size: 0.85rem;
        }

        .message .role-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: #888;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            color: #888;
            font-size: 0.85rem;
        }

        .typing-indicator::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        #input-area {
            background: #16213e;
            padding: 16px 24px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 12px 16px;
            color: #eee;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 150px;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: #e94560;
        }

        #send-btn {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        #send-btn:hover {
            opacity: 0.9;
        }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .welcome {
            align-self: center;
            text-align: center;
            color: #666;
            margin-top: auto;
            margin-bottom: auto;
        }

        .welcome h2 {
            color: #e94560;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            #sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <button onclick="newConversation()">+ Nueva conversación</button>
        </div>
        <div id="conversation-list"></div>
    </div>

    <div id="main">
        <header>
            <h1>🤖 Personal AI Assistant</h1>
            <span class="status" id="status">Connected</span>
        </header>

        <div id="chat-container">
            <div class="welcome">
                <h2>Personal AI Assistant</h2>
                <p>Escribe un mensaje para empezar una conversación.</p>
            </div>
        </div>

        <div id="input-area">
            <textarea
                id="message-input"
                placeholder="Escribe tu mensaje..."
                rows="1"
                autofocus
            ></textarea>
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let conversationId = localStorage.getItem('currentConversationId') || null;
        let isStreaming = false;

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const convList = document.getElementById('conversation-list');

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });

        // Send on Enter (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function saveConversationId(id) {
            conversationId = id;
            localStorage.setItem('currentConversationId', id);
            loadConversationList();
        }

        function newConversation() {
            conversationId = null;
            localStorage.removeItem('currentConversationId');
            chatContainer.innerHTML = `
                <div class="welcome">
                    <h2>Personal AI Assistant</h2>
                    <p>Escribe un mensaje para empezar una conversación.</p>
                </div>
            `;
            loadConversationList();
        }

        async function loadConversation(id) {
            conversationId = id;
            localStorage.setItem('currentConversationId', id);
            chatContainer.innerHTML = '';

            // Fetch conversation messages from non-streaming endpoint
            // We'll replay by sending a dummy request — but better to just
            // show stored messages. For now, clear and let user continue.
            const welcome = document.createElement('div');
            welcome.className = 'welcome';
            welcome.innerHTML = `<p>Conversación cargada. Continuá escribiendo.</p>`;
            chatContainer.appendChild(welcome);

            loadConversationList();
        }

        async function loadConversationList() {
            try {
                const resp = await fetch(`${API_BASE}/chat/conversations`);
                const conversations = await resp.json();

                convList.innerHTML = '';

                conversations.forEach(conv => {
                    const div = document.createElement('div');
                    div.className = `conv-item ${conv.id === conversationId ? 'active' : ''}`;

                    const date = new Date(conv.updated_at).toLocaleDateString('es', {
                        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                    });

                    div.innerHTML = `
                        <div class="conv-info" onclick="loadConversation('${conv.id}')">
                            <div>${conv.title} (${conv.message_count} msgs)</div>
                            <div class="conv-meta">${date}</div>
                        </div>
                        <button class="conv-delete" onclick="deleteConversation('${conv.id}', event)" title="Borrar">🗑</button>
                    `;
                    convList.appendChild(div);
                });
            } catch (e) {
                // Silently fail if endpoint not available
            }
        }

        async function deleteConversation(id, event) {
            event.stopPropagation();

            if (!confirm('¿Borrar esta conversación?')) return;

            try {
                await fetch(`${API_BASE}/chat/conversations/${id}`, {
                    method: 'DELETE',
                });

                // If we deleted the current conversation, start fresh
                if (id === conversationId) {
                    newConversation();
                }

                loadConversationList();
            } catch (e) {
                console.error('Error deleting conversation:', e);
            }
        }

        function addMessage(content, role) {
            const welcome = chatContainer.querySelector('.welcome');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'role-label';
            label.textContent = role === 'user' ? 'Tú' : 'Asistente';

            const text = document.createElement('div');
            text.textContent = content;

            div.appendChild(label);
            div.appendChild(text);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return text;
        }

        function addTypingIndicator() {
            const welcome = chatContainer.querySelector('.welcome');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typing';

            const label = document.createElement('div');
            label.className = 'role-label';
            label.textContent = 'Asistente';
            div.appendChild(label);

            const span = document.createElement('span');
            span.textContent = 'Escribiendo';
            div.appendChild(span);

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            isStreaming = true;
            sendBtn.disabled = true;
            messageInput.value = '';
            messageInput.style.height = 'auto';

            addMessage(message, 'user');
            addTypingIndicator();

            try {
                const body = {
                    message: message,
                    stream: true,
                };

                if (conversationId) {
                    body.conversation_id = conversationId;
                }

                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'Request failed');
                }

                removeTypingIndicator();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantText = null;
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;

                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'content') {
                            if (!assistantText) {
                                assistantText = addMessage('', 'assistant');
                            }
                            assistantText.textContent += data.data;
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        } else if (data.type === 'done') {
                            saveConversationId(data.conversation_id);
                        } else if (data.type === 'error') {
                            addMessage(data.data, 'error');
                        }
                    }
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage(`Error: ${error.message}`, 'error');
                statusEl.textContent = 'Error';
                statusEl.style.color = '#e94560';
                setTimeout(() => {
                    statusEl.textContent = 'Connected';
                    statusEl.style.color = '#4ecca3';
                }, 3000);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Init
        fetch(`${API_BASE}/health`)
            .then(r => r.json())
            .then(() => {
                statusEl.textContent = 'Connected';
                statusEl.style.color = '#4ecca3';
            })
            .catch(() => {
                statusEl.textContent = 'Disconnected';
                statusEl.style.color = '#e94560';
            });

        loadConversationList();
    </script>
</body>
</html>
